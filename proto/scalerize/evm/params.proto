syntax = "proto3";
package scalerize.evm;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/aerius-labs/scalerize/x/evm/types";

// Params defines the parameters for the module.
message Params {
  string name = 1;
  option (amino.name) = "github.com/aerius-labs/scalerize/x/evm/Params";
  option (gogoproto.equal) = true;
}